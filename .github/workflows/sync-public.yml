# Sync non-sensitive source files to the public repo.
# Triggered on every push to master.
#
# HOW IT WORKS:
#   1. Checkout full (private) repo
#   2. Copy everything to a temp dir, EXCLUDING files listed in .privateignore
#   3. Force-push the result to the public repo's master branch
#
# SETUP REQUIRED:
#   1. Create a GitHub Fine-grained PAT with "Contents: Read & Write" on the PUBLIC repo
#   2. Add it as a secret named PUBLIC_REPO_TOKEN in the PRIVATE repo settings
#
# ADDING NEW FILES:
#   - Public files: just create them, they sync automatically
#   - Private files: add them to .privateignore, then they won't sync

name: Sync to Public Repo

on:
  push:
    branches: [master]
  workflow_dispatch:  # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare public files
        run: |
          mkdir -p /tmp/public
          # Use rsync to copy everything except private files
          rsync -av \
            --exclude-from='.privateignore' \
            --exclude='.github/' \
            ./ /tmp/public/

      - name: Push to public repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: neo1027144-creator/antigravity-history-vscode
          publish_branch: master
          publish_dir: /tmp/public
          force_orphan: false
          keep_files: false
          commit_message: ${{ github.event.head_commit.message }}
