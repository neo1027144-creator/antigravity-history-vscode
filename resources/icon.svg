<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Crystal ball base -->
  <circle cx="12" cy="11" r="9" fill="url(#grad)" opacity="0.9"/>
  <!-- Shine effect -->
  <ellipse cx="9" cy="8" rx="3" ry="2.5" fill="white" opacity="0.25" transform="rotate(-20 9 8)"/>
  <!-- Clock hands (history) -->
  <circle cx="12" cy="11" r="4" fill="none" stroke="white" stroke-width="1.2" opacity="0.8"/>
  <line x1="12" y1="11" x2="12" y2="8.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <line x1="12" y1="11" x2="14" y2="12.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  <!-- Base stand -->
  <path d="M7 20 Q12 18 17 20" stroke="url(#grad)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
